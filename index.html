
  <!DOCTYPE html>
  <html
    lang="en"
    class="caretip-font-inter"
    style="background-color: #faf9f6; font-family: Inter, 'Inter Fallback', ui-sans-serif, system-ui, sans-serif"
  >
    <head>
      <meta charset="UTF-8" />
      <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
      />
      <meta name="color-scheme" content="light dark" />
      <meta name="theme-color" content="#FAF9F6" />
      <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)" />
      <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: dark)" />
      <meta name="msapplication-TileColor" content="#FAF9F6" />
      <meta
        name="description"
        content="CareTip: digital tipping for hospitality. Scan, tip, and support your team."
      />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <meta name="apple-mobile-web-app-title" content="CareTip" />
      <title>CareTip</title>
      <link rel="preload" href="/fonts/inter/inter-latin-400.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/fonts/inter/inter-latin-600.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/fonts/inter/inter-latin-700.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/fonts/manrope/manrope-latin-800.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="stylesheet" href="/caretip-font-faces.css" />
      <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
      <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
      <script src="/theme-init.js"></script>
    </head>

    <body style="margin: 0; background-color: #faf9f6">
      <div id="root" style="min-height: 100vh; min-height: 100dvh; background-color: #faf9f6"></div>
      <style>
        html.dark body,
        html.dark #root {
          background-color: #0a0a0a;
        }
      </style>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
