
  <!DOCTYPE html>
  <html
    lang="en"
    class="caretip-font-inter"
    style="background-color: #faf9f6; font-family: Inter, 'Inter Fallback', ui-sans-serif, system-ui, sans-serif"
  >
    <head>
      <meta charset="UTF-8" />
      <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
      />
      <meta name="color-scheme" content="light dark" />
      <meta name="theme-color" content="#FAF9F6" />
      <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)" />
      <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: dark)" />
      <meta name="msapplication-TileColor" content="#FAF9F6" />
      <meta
        name="description"
        content="CareTip: digital tipping for hospitality. Scan, tip, and support your team."
      />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <meta name="apple-mobile-web-app-title" content="CareTip" />
      <title>CareTip</title>
      <link rel="preload" href="/fonts/inter/inter-latin-400.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/fonts/inter/inter-latin-600.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/fonts/inter/inter-latin-700.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="preload" href="/fonts/manrope/manrope-latin-800.woff2" as="font" type="font/woff2" crossorigin />
      <link rel="stylesheet" href="/caretip-font-faces.css" />
      <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
      <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
      <script src="/theme-init.js"></script>
    </head>

    <body style="margin: 0; background-color: #faf9f6">
      <div id="root" style="min-height: 100vh; min-height: 100dvh; background-color: #faf9f6">
        <div
          class="caretip-initial-splash"
          role="status"
          aria-label="Loading CareTip"
          aria-busy="true"
        >
          <div class="caretip-initial-splash__wordmark">
            <span class="caretip-initial-splash__care">Care</span><span class="caretip-initial-splash__tip">Tip</span>
          </div>
          <div class="caretip-initial-splash__track" aria-hidden="true">
            <div class="caretip-initial-splash__glow"></div>
          </div>
        </div>
      </div>
      <style>
        html.dark body,
        html.dark #root {
          background-color: #0a0a0a;
        }
        .caretip-initial-splash {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          min-height: 100dvh;
          gap: 1.75rem;
          background-color: #faf9f6;
          font-family: Inter, ui-sans-serif, system-ui, sans-serif;
          animation: caretip-initial-fade-in 0.35s ease-out both;
        }
        html.dark .caretip-initial-splash {
          background-color: #0a0a0a;
        }
        .caretip-initial-splash__wordmark {
          font-size: clamp(2rem, 7vw, 2.75rem);
          font-weight: 700;
          letter-spacing: -0.04em;
          line-height: 1;
          animation: caretip-initial-logo-enter 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .caretip-initial-splash__care {
          color: #eb992c;
        }
        .caretip-initial-splash__tip {
          color: rgba(0, 0, 0, 0.45);
        }
        html.dark .caretip-initial-splash__tip {
          color: rgba(255, 255, 255, 0.72);
        }
        .caretip-initial-splash__track {
          position: relative;
          width: min(9rem, 42vw);
          height: 3px;
          border-radius: 9999px;
          background: rgba(0, 0, 0, 0.08);
          overflow: hidden;
        }
        html.dark .caretip-initial-splash__track {
          background: rgba(255, 255, 255, 0.1);
        }
        .caretip-initial-splash__glow {
          position: absolute;
          inset: 0;
          width: 42%;
          border-radius: inherit;
          background: linear-gradient(
            90deg,
            transparent 0%,
            rgba(235, 153, 44, 0.35) 35%,
            #eb992c 50%,
            rgba(235, 153, 44, 0.35) 65%,
            transparent 100%
          );
          animation: caretip-initial-glow-slide 1.35s cubic-bezier(0.45, 0, 0.25, 1) infinite;
        }
        @keyframes caretip-initial-fade-in {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes caretip-initial-logo-enter {
          from { opacity: 0; transform: scale(0.94) translateY(6px); }
          to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes caretip-initial-glow-slide {
          0% { transform: translateX(-120%); opacity: 0.55; }
          45% { opacity: 1; }
          100% { transform: translateX(280%); opacity: 0.55; }
        }
        @media (prefers-reduced-motion: reduce) {
          .caretip-initial-splash,
          .caretip-initial-splash__wordmark,
          .caretip-initial-splash__glow {
            animation: none !important;
          }
        }
      </style>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
