
  <!DOCTYPE html>
  <html lang="en" style="background-color: #faf9f6">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- First paint matches in-app splash (off-white); avoid orange OS splash before React -->
      <meta name="color-scheme" content="light dark" />
      <meta name="theme-color" content="#FAF9F6" />
      <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)" />
      <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: dark)" />
      <meta name="msapplication-TileColor" content="#FAF9F6" />
      <meta
        name="description"
        content="CareTip — digital tipping for hospitality. Scan, tip, and support your team."
      />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <meta name="apple-mobile-web-app-title" content="CareTip" />
      <title>CareTip</title>
      <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
      <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet"
      />
      <script>
        (function () {
          try {
            var saved = localStorage.getItem("caretip-theme");
            var mode = saved === "light" || saved === "dark"
              ? saved
              : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            if (mode === "dark") document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = mode;
          } catch (e) {}
        })();
      </script>
    </head>

    <body style="margin: 0">
      <div id="root" style="min-height: 100vh; min-height: 100dvh"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
